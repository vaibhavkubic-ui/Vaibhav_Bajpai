# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: # leave blank to use full name automatically
first_name: Vaibhav
last_name: Bajpai

description: >
  PhD candidate and Research Assistant at TU Bergakademie Freiberg,
  specializing in the evaluation of large language models for mathematical
  reasoning and the development of AI-driven formal verification systems.
  ProofBench is a research initiative aimed at establishing a rigorous
  benchmark for evaluating AI systems on mathematical proof generation.

contact_note: >
  I welcome research collaborations and discussions related to AI for
  mathematical reasoning, formal verification, and graph theory
  formalization in Lean 4 (Mathlib). The best way to reach me is via email.

footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with
  <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.

keywords: artificial-intelligence, machine-learning, formal-verification,
          automated-theorem-proving, lean4, mathematical-reasoning,
          proofbench, graph-theory, llm-evaluation

# -----------------------------------------------------------------------------
# Profile & URL
# -----------------------------------------------------------------------------

profile:
  align: right
  image: Vaibhav_Bajpai.jpeg   # MUST match filename in assets/img/ exactly
  image_circular: false

# Correct GitHub Pages URL
url: https://vaibhavkubic-ui.github.io 
baseurl: "" 

last_updated: true
back_to_top: true

# -----------------------------------------------------------------------------
# Theme & Features
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: true
  theme_light: flat
  theme_dark: gitdimmed

external_services:
  github_readme_stats_url: https://github-readme-stats.vercel.app
  github_profile_trophy_url: https://github-profile-trophy.vercel.app

navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: true
posts_in_search: true
bib_search: true
max_width: 930px

enable_math: true
enable_darkmode: true
enable_progressbar: true
enable_project_categories: true

# -----------------------------------------------------------------------------
# Collections & Blog
# -----------------------------------------------------------------------------

blog_name: "Research Log"
blog_description: "Notes on Formal Verification, AI, and Mathematics."

collections:
  books:
    output: true
  news:
    defaults:
      layout: post
    output: true
  projects:
    output: true
  teachings:
    output: true

# -----------------------------------------------------------------------------
# Jekyll & Plugins
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"

include: ["_pages", "_scripts"]
exclude:
  - bin/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

plugins:
  - jekyll-3rd-party-libraries
  - jekyll-archives-v2
  - jekyll-cache-bust
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-socials
  - jekyll-tabs
  - jekyll-terser
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# Scholar Settings
# -----------------------------------------------------------------------------

scholar:
  last_name: [Bajpai]
  first_name: [Vaibhav]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib

# -----------------------------------------------------------------------------
# Image Processing
# -----------------------------------------------------------------------------

imagemagick:
  enabled: true
  widths: [480, 800, 1400]
  input_directories: ["assets/img/"]
  input_formats: [".jpg", ".jpeg", ".png"]
  output_formats:
    webp: "-auto-orient -quality 85"

lazy_loading_images: true
